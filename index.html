<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Castle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a14; }
canvas { display: block; }

#label {
  position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
  background: rgba(20, 14, 8, 0.7); backdrop-filter: blur(16px);
  color: #f5e8c8; padding: 10px 28px; border-radius: 24px;
  font: 12px/1 'Georgia', serif; letter-spacing: 2.5px;
  text-transform: uppercase; pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
  border: 1px solid rgba(255,220,140,0.2);
}
#title {
  position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
  color: rgba(245, 232, 200, 0.75); font: 11px/1 'Georgia', serif;
  letter-spacing: 5px; text-transform: uppercase;
  text-shadow: 0 0 20px rgba(200,160,60,0.4);
}
#count {
  position: fixed; bottom: 28px; right: 24px;
  color: rgba(245,232,200,0.4); font: 10px/1 'Georgia', serif;
  letter-spacing: 2px; text-transform: uppercase;
}
#hint {
  position: fixed; top: 28px; right: 24px;
  color: rgba(245,232,200,0.35); font: 10px/1 'Georgia', serif;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div id="title">Memory Castle</div>
<div id="hint">hover a brick</div>
<div id="label"></div>
<div id="count"></div>

<script>
window.onerror = (m, s, l) => {
  document.body.style.background = '#1a0808';
  document.getElementById('title').textContent = 'Error: ' + m + ' line ' + l;
};
</script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Seeded random ────────────────────────────────────────
function mkRand(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0x100000000; };
}
const today = new Date();
const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

function hashStr(str) {
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++) h = Math.imul(h ^ str.charCodeAt(i), 0x01000193);
  return (h >>> 0);
}

// ─── Renderer ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

// ─── Scene ────────────────────────────────────────────────
const scene = new THREE.Scene();

// ─── Sky dome (gradient shader) ───────────────────────────
const skyGeo = new THREE.SphereGeometry(180, 24, 12);
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    topColor:    { value: new THREE.Color(0x0d1a2e) },
    horizColor:  { value: new THREE.Color(0x3a2010) },
    bottomColor: { value: new THREE.Color(0x1a0e08) },
  },
  vertexShader: `varying float vY; void main() { vY = normalize(position).y; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform vec3 topColor, horizColor, bottomColor;
    varying float vY;
    void main() {
      float t = clamp(vY, -1.0, 1.0);
      vec3 col = t > 0.0 ? mix(horizColor, topColor, pow(t, 0.5)) : mix(horizColor, bottomColor, -t * 2.0);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  side: THREE.BackSide,
  depthWrite: false,
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Horizon glow
const fogColor = new THREE.Color(0x2a1808);
scene.fog = new THREE.FogExp2(fogColor, 0.007);

// ─── Camera ───────────────────────────────────────────────
const cam = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 200);
cam.position.set(22, 18, 22);
cam.lookAt(0, 3, 0);

const ctrl = new OrbitControls(cam, renderer.domElement);
ctrl.enableDamping = true; ctrl.dampingFactor = 0.07;
ctrl.target.set(0, 3, 0);
ctrl.minPolarAngle = Math.PI / 8;
ctrl.maxPolarAngle = Math.PI / 2.1;
ctrl.minDistance = 10; ctrl.maxDistance = 50;

// ─── Lighting ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x3a2815, 2.2));

// Main sun (warm, raking light for dramatic brick shadows)
const sun = new THREE.DirectionalLight(0xffcc88, 4.0);
sun.position.set(14, 28, 8);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 80;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top = 20;
sun.shadow.radius = 2;
sun.shadow.bias = -0.001;
scene.add(sun);

// Cool blue fill from opposite side
const fill = new THREE.DirectionalLight(0x4488cc, 0.8);
fill.position.set(-10, 8, -14);
scene.add(fill);

// Warm bounce from ground
const bounce = new THREE.PointLight(0x884422, 1.2, 30);
bounce.position.set(0, -1, 0);
scene.add(bounce);

// ─── Ground ───────────────────────────────────────────────
// Stone courtyard under the castle
const groundTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1c1410'; ctx.fillRect(0, 0, 256, 256);
  const g = mkRand(7);
  for (let i = 0; i < 1200; i++) {
    const v = (g() - 0.5) * 20;
    ctx.fillStyle = 'rgba(' + (80+v) + ',' + (60+v) + ',' + (40+v) + ',0.3)';
    ctx.fillRect(g() * 256, g() * 256, 2, 2);
  }
  // Stone tile grid
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
  for (let x = 0; x < 256; x += 32) ctx.strokeRect(x, 0, 32, 256);
  for (let y = 0; y < 256; y += 32) ctx.strokeRect(0, y, 256, 32);
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(8, 8);
  return t;
})();

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(80, 80),
  new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.98, color: 0x281c14 })
);
ground.rotation.x = -Math.PI / 2; ground.position.y = -0.02;
ground.receiveShadow = true; scene.add(ground);

// Stone plinth base
const plinth = new THREE.Mesh(
  new THREE.BoxGeometry(9.5, 0.5, 7.0),
  new THREE.MeshStandardMaterial({ color: 0x1e160e, roughness: 0.95 })
);
plinth.position.y = -0.25; plinth.castShadow = true; plinth.receiveShadow = true;
scene.add(plinth);

// ─── Memory data ──────────────────────────────────────────
const CATEGORIES = ['people', 'projects', 'stories', 'preferences'];
const LABELS = {
  people:      ['A close friend', 'A mentor', 'A collaborator', 'A co-founder', 'Family', 'A teammate', 'An advisor', 'A teacher', 'An old friend'],
  projects:    ['A product shipped', 'An open source tool', 'A side project', 'A design system', 'A startup', 'A prototype', 'A feature launched', 'A thesis'],
  stories:     ['A memory made', 'A lesson learned', 'A risk taken', 'A trip abroad', 'A book that changed me', 'A decision that mattered', 'A breakthrough'],
  preferences: ['A taste developed', 'A philosophy held', 'A habit built', 'A design principle', 'A strong opinion', 'A ritual kept'],
};

// Build a flat list of memories (~230 total)
const rMem = mkRand(99);
const memories = [];
const counts = { people: 60, projects: 45, stories: 70, preferences: 55 };
CATEGORIES.forEach(cat => {
  const lbl = LABELS[cat];
  for (let i = 0; i < counts[cat]; i++) {
    memories.push({ cat, label: lbl[i % lbl.length] });
  }
});
// Shuffle memories
memories.sort(() => rMem() - 0.5);

// ─── Castle blueprint ─────────────────────────────────────
// Brick slot dimensions (world units)
const BW = 0.60; // width  (X)
const BH = 0.38; // height (Y)
const BD = 0.55; // depth  (Z)

// Running bond: every other row shifts X by half a brick
function slotPos(gx, gy, gz) {
  return new THREE.Vector3(
    (gx - 6.5) * BW + (gy % 2) * (BW * 0.5),
    gy * BH,
    (gz - 5.0) * BD
  );
}

// Generate ALL possible brick positions in castle shape
function castleBlueprint() {
  const slots = []; // { pos, section }

  function add(gx, gy, gz, section) {
    slots.push({ pos: slotPos(gx, gy, gz), section });
  }

  const W = 14, D = 10; // grid footprint

  // ── Outer walls (perimeter, rows 0–4) ─────────────────
  for (let gy = 0; gy < 5; gy++) {
    // Front wall (gz=0) — gap for gate at gx 5-8, rows 0-1
    for (let gx = 0; gx < W; gx++) {
      if (!(gx >= 5 && gx <= 8 && gy <= 1)) add(gx, gy, 0, 'stories');
    }
    // Back wall (gz=9)
    for (let gx = 0; gx < W; gx++) add(gx, gy, D - 1, 'stories');
    // Left wall (gx=0, inner z)
    for (let gz = 1; gz < D - 1; gz++) add(0, gy, gz, 'people');
    // Right wall (gx=13, inner z)
    for (let gz = 1; gz < D - 1; gz++) add(W - 1, gy, gz, 'people');
  }

  // ── Corner towers (2×2 footprint, 3 extra rows above walls) ──
  [[0, 0], [W-2, 0], [0, D-2], [W-2, D-2]].forEach(([cx, cz]) => {
    for (let gy = 5; gy < 8; gy++) {
      for (let dx = 0; dx < 2; dx++) {
        for (let dz = 0; dz < 2; dz++) add(cx+dx, gy, cz+dz, 'projects');
      }
    }
  });

  // ── Gate arch posts ────────────────────────────────────
  for (let gy = 2; gy < 5; gy++) {
    add(5, gy, 0, 'stories');
    add(8, gy, 0, 'stories');
  }

  // ── Battlements on outer walls (row 5, alternating) ───
  for (let gx = 1; gx < W-1; gx += 2) {
    add(gx, 5, 0, 'stories');   // front
    add(gx, 5, D-1, 'stories'); // back
  }
  for (let gz = 1; gz < D-1; gz += 2) {
    add(0, 5, gz, 'people');    // left
    add(W-1, 5, gz, 'people');  // right
  }

  // ── Tower battlements (row 8, alternating per tower) ─
  [[0,0],[W-2,0],[0,D-2],[W-2,D-2]].forEach(([cx, cz]) => {
    [[0,0],[1,0],[0,1],[1,1]].forEach(([dx, dz], i) => {
      if (i % 2 === 0) add(cx+dx, 8, cz+dz, 'projects');
    });
  });

  // ── Central keep (4×4 hollow, rows 0–13) ──────────────
  const KX = 5, KZ = 3;
  for (let gy = 0; gy < 14; gy++) {
    for (let dx = 0; dx < 4; dx++) {
      for (let dz = 0; dz < 4; dz++) {
        const isShell = dx === 0 || dx === 3 || dz === 0 || dz === 3;
        const isSolid = gy >= 12;
        if (isShell || isSolid) add(KX+dx, gy, KZ+dz, 'preferences');
      }
    }
  }

  // ── Keep battlements (row 14, alternating) ────────────
  [[0,0],[2,0],[0,2],[2,2],[1,1]].forEach(([dx, dz]) => {
    add(KX+dx, 14, KZ+dz, 'preferences');
  });

  // ── Keep spire (2×2, rows 14-17) ─────────────────────
  const SX = KX + 1, SZ = KZ + 1;
  for (let gy = 14; gy < 18; gy++) {
    add(SX,   gy, SZ,   'preferences');
    add(SX+1, gy, SZ,   'preferences');
    add(SX,   gy, SZ+1, 'preferences');
    add(SX+1, gy, SZ+1, 'preferences');
  }

  return slots;
}

const allSlots = castleBlueprint();

// Sort bottom-to-top so castle builds from foundation up
allSlots.sort((a, b) => a.pos.y - b.pos.y || a.pos.x - b.pos.x || a.pos.z - b.pos.z);

const N_TOTAL = allSlots.length;
const N_MEM   = memories.length;
const N_FILL  = Math.min(N_MEM, N_TOTAL);

document.getElementById('count').textContent = N_FILL + ' memories · ' + N_TOTAL + ' bricks';

// ─── Category colors ──────────────────────────────────────
const CAT_COLOR = {
  people:      new THREE.Color(0x6a9ab8),
  projects:    new THREE.Color(0x5a8845),
  stories:     new THREE.Color(0xb87845),
  preferences: new THREE.Color(0x8865a8),
};
const EMPTY_COLOR = new THREE.Color(0x1e1612);

// ─── InstancedMesh for all bricks ─────────────────────────
// Slight chamfer effect: scale bricks to 0.91 of slot to show mortar
const brickGeo = new THREE.BoxGeometry(BW * 0.90, BH * 0.86, BD * 0.90);
const brickMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.88,
  metalness: 0.04,
});

const iMesh = new THREE.InstancedMesh(brickGeo, brickMat, N_TOTAL);
iMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
iMesh.castShadow = true;
iMesh.receiveShadow = true;
scene.add(iMesh);

const dummy = new THREE.Object3D();
const brickData = []; // { label, basePos, isFilled, isNew }

// Color variation seed
const rCol = mkRand(333);

allSlots.forEach(({ pos, section }, i) => {
  const isFilled = i < N_FILL;

  dummy.position.copy(pos);
  dummy.updateMatrix();
  iMesh.setMatrixAt(i, dummy.matrix);

  let color;
  if (isFilled) {
    color = CAT_COLOR[section].clone();
    // Subtle per-brick variation for natural stone look
    const v = (rCol() - 0.5) * 0.12;
    color.r = Math.max(0.02, Math.min(0.98, color.r + v));
    color.g = Math.max(0.02, Math.min(0.98, color.g + v));
    color.b = Math.max(0.02, Math.min(0.98, color.b + v));
  } else {
    color = EMPTY_COLOR.clone();
  }
  iMesh.setColorAt(i, color);

  brickData.push({
    label: isFilled ? memories[i].label : null,
    cat:   section,
    basePos: pos.clone(),
    isFilled,
    isNew: false, // set below
  });
});

iMesh.instanceMatrix.needsUpdate = true;
iMesh.instanceColor.needsUpdate = true;

// ─── 10% daily animation selection ───────────────────────
// Pick from the TOP filled bricks (most recently added)
const filledIndices = brickData.map((_, i) => i).filter(i => brickData[i].isFilled);
// Score: highest bricks + daily randomness
const animCandidates = filledIndices
  .map(i => ({ i, score: brickData[i].basePos.y * 10 + hashStr(i + '-' + dateSeed) / 0xffffffff }))
  .sort((a, b) => b.score - a.score)
  .slice(0, Math.max(1, Math.ceil(N_FILL * 0.10)));

animCandidates.forEach(({ i }) => { brickData[i].isNew = true; });

// Prepare animation state
const animItems = [];
animCandidates.forEach(({ i }, animIdx) => {
  const d = brickData[i];

  // Start brick high above, invisible
  dummy.position.set(d.basePos.x, d.basePos.y + 14, d.basePos.z);
  dummy.updateMatrix();
  iMesh.setMatrixAt(i, dummy.matrix);

  // Tint this brick black (will restore on land)
  iMesh.setColorAt(i, new THREE.Color(0x000000));

  animItems.push({
    idx:    i,
    delay:  1.5 + animIdx * 0.28,
    elapsed: 0,
    phase:  'wait',
    baseColor: CAT_COLOR[d.cat].clone().multiplyScalar(1.1 + Math.random() * 0.2),
  });
});

iMesh.instanceMatrix.needsUpdate = true;
iMesh.instanceColor.needsUpdate = true;

// ─── Ambient ember particles ──────────────────────────────
const particleGeo = new THREE.BufferGeometry();
const PCOUNT = 300;
const pPos = new Float32Array(PCOUNT * 3);
const pSeed = mkRand(55);
for (let i = 0; i < PCOUNT; i++) {
  pPos[i*3]   = (pSeed() - 0.5) * 20;
  pPos[i*3+1] = pSeed() * 12;
  pPos[i*3+2] = (pSeed() - 0.5) * 15;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(
  particleGeo,
  new THREE.PointsMaterial({ color: 0xff8844, size: 0.06, transparent: true, opacity: 0.5 })
);
scene.add(particles);

// ─── Hover ────────────────────────────────────────────────
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2(-999, -999);
const labelEl = document.getElementById('label');
let curHover = -1;
let curHoverColor = null;

addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
});
addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Render loop ──────────────────────────────────────────
const clock = new THREE.Clock();
let needsColorUpdate = false;

renderer.setAnimationLoop(() => {
  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();
  ctrl.update();

  // Drift ember particles upward
  const pArr = particleGeo.attributes.position.array;
  for (let i = 0; i < PCOUNT; i++) {
    pArr[i*3+1] += dt * (0.3 + Math.sin(t * 0.3 + i) * 0.15);
    if (pArr[i*3+1] > 14) pArr[i*3+1] = pSeed() * 1.5;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // ── Brick animations ──────────────────────────────────
  for (const item of animItems) {
    if (item.phase === 'done') continue;
    item.elapsed += dt;
    const d = brickData[item.idx];

    if (item.phase === 'wait') {
      if (item.elapsed >= item.delay) {
        item.phase = 'fall'; item.elapsed = 0;
      }
    } else if (item.phase === 'fall') {
      const p = Math.min(item.elapsed / 1.1, 1);
      // Smooth gravity ease
      const ease = p < 0.65 ? (p / 0.65) ** 2.2 : 1 - Math.sin((p - 0.65) / 0.35 * Math.PI * 0.5) * 0.04 * (1 - p);
      const y = d.basePos.y + 14 * (1 - ease);

      dummy.position.set(d.basePos.x, y, d.basePos.z);
      dummy.updateMatrix();
      iMesh.setMatrixAt(item.idx, dummy.matrix);

      // Fade color from black to target
      const frac = Math.min(p * 1.8, 1);
      const col = item.baseColor.clone().multiplyScalar(frac);
      iMesh.setColorAt(item.idx, col);
      needsColorUpdate = true;

      if (p >= 1) {
        dummy.position.copy(d.basePos); dummy.updateMatrix();
        iMesh.setMatrixAt(item.idx, dummy.matrix);
        iMesh.setColorAt(item.idx, item.baseColor);
        item.phase = 'squash'; item.elapsed = 0;
      }
    } else if (item.phase === 'squash') {
      const p = Math.min(item.elapsed / 0.18, 1);
      const sx = p < 0.4 ? 1 + 0.18 * (p / 0.4) : 1.18 - 0.18 * ((p - 0.4) / 0.6);
      const sy = p < 0.4 ? 1 - 0.22 * (p / 0.4) : 0.78 + 0.22 * ((p - 0.4) / 0.6);
      dummy.position.copy(d.basePos);
      dummy.scale.set(sx, Math.max(sy, 0.3), sx);
      dummy.updateMatrix();
      iMesh.setMatrixAt(item.idx, dummy.matrix);
      if (p >= 1) {
        dummy.scale.set(1, 1, 1); dummy.position.copy(d.basePos);
        dummy.updateMatrix(); iMesh.setMatrixAt(item.idx, dummy.matrix);
        item.phase = 'glow'; item.elapsed = 0;
      }
    } else if (item.phase === 'glow') {
      // Flash bright gold
      const p = Math.min(item.elapsed / 0.6, 1);
      const intensity = Math.sin(p * Math.PI) * 0.9;
      const glowCol = item.baseColor.clone().lerp(new THREE.Color(0xffd070), intensity);
      iMesh.setColorAt(item.idx, glowCol);
      needsColorUpdate = true;
      if (p >= 1) {
        iMesh.setColorAt(item.idx, item.baseColor);
        item.phase = 'done';
      }
    }
    iMesh.instanceMatrix.needsUpdate = true;
  }

  if (needsColorUpdate) {
    iMesh.instanceColor.needsUpdate = true;
    needsColorUpdate = false;
  }

  // ── Hover ─────────────────────────────────────────────
  ray.setFromCamera(mouse, cam);
  const hits = ray.intersectObject(iMesh);

  let hoverIdx = -1;
  if (hits.length > 0) hoverIdx = hits[0].instanceId;

  if (hoverIdx !== curHover) {
    // Restore previous hover
    if (curHover >= 0 && curHoverColor) {
      iMesh.setColorAt(curHover, curHoverColor);
      iMesh.instanceColor.needsUpdate = true;
    }

    curHover = hoverIdx;
    const d = hoverIdx >= 0 ? brickData[hoverIdx] : null;

    if (d?.label) {
      // Save current color and apply bright highlight
      const cur = new THREE.Color();
      iMesh.getColorAt(hoverIdx, cur);
      curHoverColor = cur.clone();

      iMesh.setColorAt(hoverIdx, cur.clone().lerp(new THREE.Color(0xffffff), 0.5));
      iMesh.instanceColor.needsUpdate = true;

      labelEl.textContent = d.label;
      labelEl.style.opacity = '1';
      document.body.style.cursor = 'pointer';
    } else {
      curHoverColor = null;
      labelEl.style.opacity = '0';
      document.body.style.cursor = 'default';
    }
  }

  renderer.render(scene, cam);
});

// Lazy particle seed reference fix
function pSeed() { return Math.random(); }

</script>
</body>
</html>
