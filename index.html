<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Castle</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#050408; }
canvas { display:block; }
#label {
  position:fixed; bottom:36px; left:50%; transform:translateX(-50%);
  background:rgba(10,6,4,0.82); backdrop-filter:blur(18px);
  color:#f5e8c8; padding:10px 32px; border-radius:24px;
  font:12px/1 'Georgia',serif; letter-spacing:2.5px; text-transform:uppercase;
  pointer-events:none; opacity:0; transition:opacity 0.2s;
  border:1px solid rgba(255,210,120,0.2); z-index:20;
}
#title {
  position:fixed; top:26px; left:50%; transform:translateX(-50%);
  color:rgba(245,232,200,0.55); font:11px/1 'Georgia',serif;
  letter-spacing:5px; text-transform:uppercase;
  text-shadow:0 0 24px rgba(220,160,60,0.35); z-index:20;
}
#stage { position:fixed; top:26px; left:24px; color:rgba(245,232,200,0.3); font:10px/1 'Georgia',serif; letter-spacing:1.5px; text-transform:uppercase; z-index:20; }
#count { position:fixed; bottom:24px; right:24px; color:rgba(245,232,200,0.28); font:10px/1 'Georgia',serif; letter-spacing:2px; text-transform:uppercase; z-index:20; }
#toggle {
  position:fixed; top:20px; right:20px; z-index:30;
  width:38px; height:38px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.09); backdrop-filter:blur(12px);
  cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  transition:background 0.3s; user-select:none;
}
#toggle:hover { background:rgba(255,255,255,0.18); }
#vignette { position:fixed; inset:0; pointer-events:none; z-index:10; background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%); }
</style>
</head>
<body>
<div id="title">Memory Castle</div>
<div id="stage"></div>
<div id="label"></div>
<div id="count"></div>
<button id="toggle">🌙</button>
<div id="vignette"></div>
<script>window.onerror=(m,s,l)=>{ const t=document.getElementById('title'); t.textContent='Error (line '+l+'): '+m; t.style.color='#f66'; };</script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ─── utils ─────────────────────────────────────── */
function mkRand(seed){ let s=(seed^0xdeadbeef)>>>0; return ()=>{ s=(Math.imul(s,1664525)+1013904223)>>>0; return s/0x100000000; }; }
const today=new Date();
const dateSeed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
function hash32(v){ v=(v^61)^(v>>>16); v+=v<<3; v^=v>>>4; v=Math.imul(v,0x27d4eb2d); return(v^(v>>>15))>>>0; }

/* ─── renderer ──────────────────────────────────── */
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.88;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();

/* ─── sky ────────────────────────────────────────── */
const SKY={ dark:{top:new THREE.Color(0x050912),horiz:new THREE.Color(0x16100a),bot:new THREE.Color(0x030205)}, light:{top:new THREE.Color(0x1a4a8e),horiz:new THREE.Color(0x72acd8),bot:new THREE.Color(0x8ec4b4)} };
const skyU={ top:{value:SKY.dark.top.clone()}, horiz:{value:SKY.dark.horiz.clone()}, bot:{value:SKY.dark.bot.clone()} };
scene.add(new THREE.Mesh(new THREE.SphereGeometry(160,24,12), new THREE.ShaderMaterial({uniforms:skyU,
  vertexShader:`varying float vY; void main(){ vY=normalize(position).y; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`uniform vec3 top,horiz,bot; varying float vY; void main(){ float t=clamp(vY,-1.,1.); gl_FragColor=vec4(t>0.?mix(horiz,top,pow(t,.5)):mix(horiz,bot,-t*2.),1.); }`,
  side:THREE.BackSide,depthWrite:false})));

/* ─── camera: 3/4 angle — see front wall + right side + two towers ─ */
const cam=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.1,200);
cam.position.set(-9, 11, -16);
const ctrl=new OrbitControls(cam,renderer.domElement);
ctrl.enableDamping=true; ctrl.dampingFactor=0.07;
ctrl.target.set(0,3,0);
ctrl.minPolarAngle=Math.PI/9; ctrl.maxPolarAngle=Math.PI/2.1;
ctrl.minDistance=7; ctrl.maxDistance=50;

/* ─── brick constants (scaled up ~35%) ─────────── */
const BW=0.80, BH=0.50, BD=0.72;

/* ─── lighting ──────────────────────────────────── */
const ambient=new THREE.AmbientLight(0x080c1a,2.8); scene.add(ambient);
const hemi=new THREE.HemisphereLight(0x182040,0x0e0808,1.2); scene.add(hemi);

// Moon / Sun key (positioned in FRONT of castle = negative Z side, lights visible faces)
const keyLight=new THREE.DirectionalLight(0x9aacc8,2.6);
keyLight.position.set(-16,30,-20);
keyLight.castShadow=true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.near=0.5; keyLight.shadow.camera.far=80;
keyLight.shadow.camera.left=keyLight.shadow.camera.bottom=-20;
keyLight.shadow.camera.right=keyLight.shadow.camera.top=20;
keyLight.shadow.radius=2; keyLight.shadow.bias=-0.001;
scene.add(keyLight);

const fillLight=new THREE.DirectionalLight(0xb08858,0.8); fillLight.position.set(16,8,-18); scene.add(fillLight);
const rimLight=new THREE.DirectionalLight(0x304868,0.45); rimLight.position.set(6,22,16); scene.add(rimLight);

const torchL=new THREE.PointLight(0xff8833,5.5,8); scene.add(torchL);
const torchR=new THREE.PointLight(0xff8833,5.5,8); scene.add(torchR);
const keepGlow=new THREE.PointLight(0xff9944,3.5,12); scene.add(keepGlow);

scene.fog=new THREE.FogExp2(new THREE.Color(0x10080c),0.005);

/* ─── ground ─────────────────────────────────────── */
const gndTex=(()=>{ const c=document.createElement('canvas'); c.width=c.height=256; const ctx=c.getContext('2d'); ctx.fillStyle='#100c08'; ctx.fillRect(0,0,256,256); const g=mkRand(7); for(let i=0;i<500;i++){ const v=(g()-.5)*14; ctx.fillStyle=`rgba(${46+v|0},${36+v|0},${24+v|0},0.4)`; ctx.fillRect(g()*256,g()*256,2,2); } const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(10,10); return t; })();
const gndMat=new THREE.MeshStandardMaterial({map:gndTex,roughness:0.99,color:0x140e0a});
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(120,120),gndMat);
gnd.rotation.x=-Math.PI/2; gnd.position.y=-0.02; gnd.receiveShadow=true; scene.add(gnd);

const plinth=new THREE.Mesh(new THREE.BoxGeometry(8.0,0.4,5.6),new THREE.MeshStandardMaterial({color:0x1a0f08,roughness:0.96}));
plinth.position.y=-0.21; plinth.castShadow=true; plinth.receiveShadow=true; scene.add(plinth);

// Moat
const moatShape=new THREE.Shape();
moatShape.moveTo(-10,-7); moatShape.lineTo(10,-7); moatShape.lineTo(10,7); moatShape.lineTo(-10,7); moatShape.lineTo(-10,-7);
const moatHole=new THREE.Path();
moatHole.moveTo(-4.6,-3.2); moatHole.lineTo(4.6,-3.2); moatHole.lineTo(4.6,3.2); moatHole.lineTo(-4.6,3.2); moatHole.lineTo(-4.6,-3.2);
moatShape.holes.push(moatHole);
const moatMat=new THREE.MeshStandardMaterial({color:0x18304c,roughness:0.04,metalness:0.92,transparent:true,opacity:0.92});
const moatMesh=new THREE.Mesh(new THREE.ShapeGeometry(moatShape,3),moatMat);
moatMesh.rotation.x=-Math.PI/2; moatMesh.position.y=-0.07; scene.add(moatMesh);

/* ══════════════════════════════════════════════════
   CASTLE LAYOUT
   NO running bond (gy%2 offset removed) — clean stacking,
   no misalignment with cone caps.
   H_WALL=2 (short curtain walls), TOWER_EXTRA=4 (dramatic height)
   ══════════════════════════════════════════════════ */
const GW=8, GD=6;
const GATE_GX=3, GATE_W=2, GATE_H=2; // gate: 2 wide × 2 tall
const H_WALL=2, TOWER_EXTRA=4;
const KX=2, KZ=2, KW=3, KD=3;
const SPIRE_GX=3, SPIRE_GZ=3; // 2×2 spire centered on keep

// No running bond — every brick stacks cleanly
function brickPos(gx,gy,gz){
  return new THREE.Vector3((gx-GW/2+0.5)*BW, gy*BH, (gz-GD/2+0.5)*BD);
}

function buildCastleForN(N){
  const slots=[];
  const add=(gx,gy,gz,sec)=>slots.push({pos:brickPos(gx,gy,gz),section:sec});

  // 1. Curtain walls (short, H_WALL=2)
  for(let gy=0;gy<H_WALL;gy++){
    for(let gx=0;gx<GW;gx++) if(!(gx>=GATE_GX&&gx<GATE_GX+GATE_W&&gy<GATE_H)) add(gx,gy,0,'stories');
    for(let gx=0;gx<GW;gx++) add(gx,gy,GD-1,'stories');
    for(let gz=1;gz<GD-1;gz++) add(0,gy,gz,'people');
    for(let gz=1;gz<GD-1;gz++) add(GW-1,gy,gz,'people');
  }
  // 2. Wall battlements (row H_WALL, alternating merlons)
  for(let gx=0;gx<GW;gx+=2){ add(gx,H_WALL,0,'stories'); add(gx,H_WALL,GD-1,'stories'); }
  for(let gz=1;gz<GD-1;gz+=2){ add(0,H_WALL,gz,'people'); add(GW-1,H_WALL,gz,'people'); }

  // 3. Corner towers (rows H_WALL+1 → H_WALL+TOWER_EXTRA, 2×2 stacks)
  const TCORNERS=[[0,0],[GW-2,0],[0,GD-2],[GW-2,GD-2]];
  for(let gy=H_WALL+1;gy<=H_WALL+TOWER_EXTRA;gy++)
    for(const[cx,cz]of TCORNERS) for(let dx=0;dx<2;dx++) for(let dz=0;dz<2;dz++) add(cx+dx,gy,cz+dz,'projects');
  // 4. Tower battlement caps (alternating 2 bricks per tower)
  const tcgy=H_WALL+TOWER_EXTRA+1;
  for(const[cx,cz]of TCORNERS){ add(cx,tcgy,cz,'projects'); add(cx+1,tcgy,cz+1,'projects'); }

  // 5. Keep shell (rows 0 → H_WALL+4, hollow 3×3)
  const H_KEEP=H_WALL+5;
  for(let gy=0;gy<H_KEEP;gy++)
    for(let dx=0;dx<KW;dx++) for(let dz=0;dz<KD;dz++)
      if(dx===0||dx===KW-1||dz===0||dz===KD-1) add(KX+dx,gy,KZ+dz,'preferences');
  // 6. Keep cap (solid 2 rows)
  for(let gy=H_KEEP;gy<H_KEEP+2;gy++)
    for(let dx=0;dx<KW;dx++) for(let dz=0;dz<KD;dz++) add(KX+dx,gy,KZ+dz,'preferences');

  // 7. Spire — absorbs remainder bricks
  const baseCount=slots.length;
  const spireStart=H_KEEP+2;
  const spireRows=Math.floor(Math.max(0,N-baseCount)/4);
  for(let gy=spireStart;gy<spireStart+spireRows;gy++)
    for(let dx=0;dx<2;dx++) for(let dz=0;dz<2;dz++) add(SPIRE_GX+dx,gy,SPIRE_GZ+dz,'preferences');

  return slots.slice(0,N);
}

/* ─── memories ───────────────────────────────────── */
const LABELS={
  people:     ['A close friend','A mentor','A collaborator','A co-founder','Family','A teammate','An advisor','A teacher','An old friend','A rival turned ally'],
  projects:   ['A product shipped','An open source tool','A side project','A design system','A startup','A prototype','A feature launched','A thesis'],
  stories:    ['A memory made','A lesson learned','A risk taken','A trip abroad','A book that changed me','A decision that mattered','A breakthrough','A failure survived'],
  preferences:['A taste developed','A philosophy held','A habit built','A design principle','A strong opinion','A ritual kept','An aesthetic found'],
};
const MCOUNTS={people:60,projects:45,stories:70,preferences:55};
const memories=[];
for(const[cat,n]of Object.entries(MCOUNTS)){ const l=LABELS[cat]; for(let i=0;i<n;i++) memories.push({cat,label:l[i%l.length]}); }
const rShuf=mkRand(314); memories.sort(()=>rShuf()-.5);

const N=memories.length;
const slots=buildCastleForN(N);
document.getElementById('stage').textContent=N<80?'foundations':N<180?'curtain walls':N<230?'battlements':N<320?'towers & keep':N<500?'fortress':N<800?'stronghold':'great citadel';
document.getElementById('count').textContent=N+' memories';

/* ─── section colors: unified sandstone palette ──── */
// All bricks read as STONE. Category = subtle tint only.
const SEC_COL={
  stories:    new THREE.Color(0xd4a96a), // warm amber sandstone
  people:     new THREE.Color(0xadbec8), // cool grey limestone
  projects:   new THREE.Color(0xa8c490), // sage-green stone
  preferences:new THREE.Color(0xc0aed0), // soft lavender stone
};

/* ─── instanced mesh ─────────────────────────────── */
const bGeo=new THREE.BoxGeometry(BW*0.88,BH*0.84,BD*0.88);
const bMat=new THREE.MeshStandardMaterial({
  color:0xffffff, roughness:0.86, metalness:0.03,
  // Dark warm brown emissive = safety net for deep shadow, NOT white
  emissive:new THREE.Color(0x180a04), emissiveIntensity:0.55,
});
const iMesh=new THREE.InstancedMesh(bGeo,bMat,N);
iMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
iMesh.castShadow=true; iMesh.receiveShadow=true; scene.add(iMesh);

const dummy=new THREE.Object3D();
const meta=[];
const rCol=mkRand(91);
slots.forEach(({pos,section},i)=>{
  const mem=memories[i];
  const base=SEC_COL[section].clone();
  const v=(rCol()-.5)*0.10;
  base.r=THREE.MathUtils.clamp(base.r+v,0.02,0.98);
  base.g=THREE.MathUtils.clamp(base.g+v,0.02,0.98);
  base.b=THREE.MathUtils.clamp(base.b+v,0.02,0.98);
  dummy.position.copy(pos); dummy.scale.set(1,1,1); dummy.updateMatrix();
  iMesh.setMatrixAt(i,dummy.matrix); iMesh.setColorAt(i,base);
  meta.push({label:mem.label,section,basePos:pos.clone(),baseColor:base.clone()});
});
iMesh.instanceMatrix.needsUpdate=true; iMesh.instanceColor.needsUpdate=true;

/* ─── torch positions ────────────────────────────── */
const frontZ=(0-GD/2+0.5)*BD;
torchL.position.set(-0.5*BW,1.1,frontZ-0.5);
torchR.position.set( 0.5*BW,1.1,frontZ-0.5);
keepGlow.position.set(0,1.8,0.4);

/* ─── stone material for decorative geometry ─────── */
const stoneMat=new THREE.MeshStandardMaterial({color:0xb89060,roughness:0.82,metalness:0.04,emissive:new THREE.Color(0x180a04),emissiveIntensity:0.45});
const roofMat =new THREE.MeshStandardMaterial({color:0x5a2810,roughness:0.78,metalness:0.06,emissive:new THREE.Color(0x120804),emissiveIntensity:0.35});
const poleMat =new THREE.MeshStandardMaterial({color:0x8a6420,roughness:0.7});

/* ─── tower cone caps (NO overlap with bricks) ───── */
// Brick top edge = gy*BH + BH*0.84/2 (half visible brick height)
// Cone sits with a small gap above the top brick edge.
function towerTopY(row){ return row*BH + BH*0.84*0.5 + 0.04; } // slight gap above brick top

const TCORNERS=[[0,0],[GW-2,0],[0,GD-2],[GW-2,GD-2]];
const tcgy=H_WALL+TOWER_EXTRA+1;

TCORNERS.forEach(([cx,cz])=>{
  // Tower center (2×2 block center, no running bond offset)
  const tx=(cx+1-GW/2)*BW, tz=(cz+1-GD/2)*BD;
  const coneBottom=towerTopY(tcgy);
  const coneH=1.10;
  const cone=new THREE.Mesh(new THREE.ConeGeometry(0.52,coneH,8),roofMat.clone());
  cone.position.set(tx, coneBottom+coneH*0.5, tz); scene.add(cone);

  const poleH=0.55;
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.024,0.024,poleH,5),poleMat);
  pole.position.set(tx, coneBottom+coneH+poleH*0.5, tz); scene.add(pole);

  const flag=new THREE.Mesh(new THREE.BoxGeometry(0.28,0.15,0.02),new THREE.MeshBasicMaterial({color:0x3a7a30,side:THREE.DoubleSide}));
  flag.position.set(tx+0.15, coneBottom+coneH+poleH*0.8, tz); scene.add(flag);
});

/* ─── keep cone ──────────────────────────────────── */
const H_KEEP=H_WALL+5;
const keepCapRow=H_KEEP+1;
const kx=(KX+1-GW/2+0.5)*BW, kz=(KZ+1-GD/2+0.5)*BD;
const kConeBottom=towerTopY(keepCapRow);
const kConeH=1.30;
const keepCone=new THREE.Mesh(new THREE.ConeGeometry(0.65,kConeH,8),roofMat.clone());
keepCone.position.set(kx, kConeBottom+kConeH*0.5, kz); scene.add(keepCone);
const kPoleH=0.65;
const keepPole=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.028,kPoleH,5),poleMat);
keepPole.position.set(kx, kConeBottom+kConeH+kPoleH*0.5, kz); scene.add(keepPole);
const keepFlag=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.17,0.02),new THREE.MeshBasicMaterial({color:0x882299,side:THREE.DoubleSide}));
keepFlag.position.set(kx+0.18, kConeBottom+kConeH+kPoleH*0.82, kz); scene.add(keepFlag);

/* ─── spire cone ─────────────────────────────────── */
const baseCountCalc=(()=>{
  let cnt=0;
  for(let gy=0;gy<H_WALL;gy++){
    for(let gx=0;gx<GW;gx++) if(!(gx>=GATE_GX&&gx<GATE_GX+GATE_W&&gy<GATE_H)) cnt++;
    cnt+=GW+2*(GD-2)+2*(GD-2);
  }
  for(let gx=0;gx<GW;gx+=2) cnt+=2; for(let gz=1;gz<GD-1;gz+=2) cnt+=2;
  cnt+=TCORNERS.length*4*TOWER_EXTRA+TCORNERS.length*2;
  cnt+=(H_WALL+5)*2*(KW+KD-2)+KW*KD*2;
  return cnt;
})();
const spireRows=Math.floor(Math.max(0,N-baseCountCalc)/4);
const spireStart=H_KEEP+2;
if(spireRows>0){
  const spTopRow=spireStart+spireRows-1;
  const sx=(SPIRE_GX+1-GW/2)*BW, sz=(SPIRE_GZ+1-GD/2)*BD;
  const sConeBottom=towerTopY(spTopRow);
  const sConeH=0.85+spireRows*0.06;
  const sCone=new THREE.Mesh(new THREE.ConeGeometry(0.38,sConeH,7),(()=>{ const m=roofMat.clone(); m.color.set(0x6a3018); return m; })());
  sCone.position.set(sx, sConeBottom+sConeH*0.5, sz); scene.add(sCone);
  const spPoleH=0.50;
  const spPole=new THREE.Mesh(new THREE.CylinderGeometry(0.020,0.020,spPoleH,5),poleMat);
  spPole.position.set(sx, sConeBottom+sConeH+spPoleH*0.5, sz); scene.add(spPole);
  const spFlag=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.13,0.02),new THREE.MeshBasicMaterial({color:0x9944cc,side:THREE.DoubleSide}));
  spFlag.position.set(sx+0.14, sConeBottom+sConeH+spPoleH*0.8, sz); scene.add(spFlag);
}

/* ─── gate arch ──────────────────────────────────── */
// True arch spanning the gate opening
const gateW_world=GATE_W*BW;            // 2×0.80=1.60
const archR=gateW_world*0.5;             // 0.80
const archCenterX=((GATE_GX+GATE_W*0.5)-GW/2)*BW; // world X center of gate = 0
const archZ=frontZ-0.02;
// Half-torus arch: opens downward, spans gate width
const archGeo=new THREE.TorusGeometry(archR,0.065,8,20,Math.PI);
const archMesh=new THREE.Mesh(archGeo,stoneMat.clone());
// TorusGeometry default: ring lies in XY plane (face points +Z)
// Rotate so arch is vertical (in XY plane) facing toward camera (-Z):
archMesh.rotation.z=Math.PI; // flip: arch now opens upward → downward 
// The arch spans from bottom-left to bottom-right with peak at top
// Position center of arch at (gateX, archR from ground, frontZ)
archMesh.position.set(archCenterX, archR, archZ);
scene.add(archMesh);

// Arch keystone (decorative top cap)
const keystone=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.18,0.12),stoneMat.clone());
keystone.position.set(archCenterX, archR*2+0.05, archZ); scene.add(keystone);

/* ─── window glows on keep ───────────────────────── */
const winMat=new THREE.MeshBasicMaterial({color:0xff9944,transparent:true,opacity:0.8,side:THREE.DoubleSide});
for(let gy=1;gy<H_KEEP;gy+=2){
  const w=new THREE.Mesh(new THREE.PlaneGeometry(0.18,0.24),winMat.clone());
  w.position.set(kx,gy*BH+BH*0.3,kz-KD*BD*0.5+0.05); scene.add(w);
  const w2=w.clone(); w2.position.set(kx+KW*BW*0.5-0.05,gy*BH+BH*0.3,kz); w2.rotation.y=Math.PI/2; scene.add(w2);
}

/* ─── flame sprites ──────────────────────────────── */
const flameTex=(()=>{ const c=document.createElement('canvas'); c.width=c.height=64; const ctx=c.getContext('2d'); const g=ctx.createRadialGradient(32,38,0,32,38,30); g.addColorStop(0,'rgba(255,215,60,0.95)'); g.addColorStop(0.35,'rgba(255,100,20,0.7)'); g.addColorStop(1,'rgba(255,60,0,0)'); ctx.fillStyle=g; ctx.fillRect(0,0,64,64); return new THREE.CanvasTexture(c); })();
const fMat=new THREE.SpriteMaterial({map:flameTex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
const flameL=new THREE.Sprite(fMat.clone()); flameL.scale.set(0.55,0.70,1); flameL.position.set(torchL.position.x,torchL.position.y+0.22,torchL.position.z); scene.add(flameL);
const flameR=new THREE.Sprite(fMat.clone()); flameR.scale.set(0.55,0.70,1); flameR.position.set(torchR.position.x,torchR.position.y+0.22,torchR.position.z); scene.add(flameR);

/* ─── embers ─────────────────────────────────────── */
const PCOUNT=160, pBuf=new Float32Array(PCOUNT*3);
for(let i=0;i<PCOUNT;i++){ pBuf[i*3]=(Math.random()-.5)*20; pBuf[i*3+1]=Math.random()*11; pBuf[i*3+2]=(Math.random()-.5)*14; }
const pGeo=new THREE.BufferGeometry(); pGeo.setAttribute('position',new THREE.BufferAttribute(pBuf,3));
scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0xff8844,size:0.065,transparent:true,opacity:0.32})));

/* ─── stars ──────────────────────────────────────── */
const sPos=new Float32Array(2000*3); const rStar=mkRand(333);
for(let i=0;i<2000;i++){ const th=rStar()*Math.PI*2,ph=Math.acos(rStar()*2-1),r=140+rStar()*10; sPos[i*3]=r*Math.sin(ph)*Math.cos(th); sPos[i*3+1]=r*Math.sin(ph)*Math.sin(th); sPos[i*3+2]=r*Math.cos(ph); }
const starGeo=new THREE.BufferGeometry(); starGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
const stars=new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff,size:0.28,transparent:true,opacity:0.85,sizeAttenuation:true})); scene.add(stars);

/* ─── moon ───────────────────────────────────────── */
const moonMesh=new THREE.Mesh(new THREE.SphereGeometry(2.4,12,8),new THREE.MeshBasicMaterial({color:0xdde8f4}));
moonMesh.position.set(-40,55,-90); scene.add(moonMesh);
const moonDL=new THREE.DirectionalLight(0x7788bb,0); moonDL.position.set(-40,55,-90); scene.add(moonDL);

/* ─── clouds ─────────────────────────────────────── */
const cloudTex=(()=>{ const c=document.createElement('canvas'); c.width=512; c.height=256; const ctx=c.getContext('2d'); [[120,130,80],[220,100,60],[310,140,55],[420,110,65],[80,150,45]].forEach(([x,y,r])=>{ const g=ctx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,'rgba(255,255,255,0.95)'); g.addColorStop(.6,'rgba(255,255,255,0.5)'); g.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }); return new THREE.CanvasTexture(c); })();
const cloudPos=[[-18,22,-38],[14,26,-42],[30,20,-30],[-10,25,-46],[22,19,-22]];
const clouds=cloudPos.map(([x,y,z])=>{ const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:cloudTex,transparent:true,opacity:0.84,depthWrite:false})); sp.scale.set(20,8,1); sp.position.set(x,y,z); sp.visible=false; scene.add(sp); return sp; });

/* ══════════════════════════════════════════════════
   ANIMATION: TOP 10% ALWAYS DROPS IN
   Bottom 90% appear instantly (castle already complete).
   Top 10% (highest bricks = spire, keep cap, tower caps)
   drop from above: viewers see the castle being finished.
   ══════════════════════════════════════════════════ */
const sorted=[...meta.map((_,i)=>i)].sort((a,b)=>meta[b].basePos.y-meta[a].basePos.y);
const DROP_COUNT=Math.max(1,Math.ceil(N*0.10));
const dropSet=new Set(sorted.slice(0,DROP_COUNT));

// Instant bricks: set full color immediately
meta.forEach((_,i)=>{ if(!dropSet.has(i)) iMesh.setColorAt(i,meta[i].baseColor); else iMesh.setColorAt(i,new THREE.Color(0)); });
iMesh.instanceColor.needsUpdate=true;

// Drop bricks: sort by Y ascending (lowest of the top-10% drop first → castle fills bottom→top)
const dropSorted=sorted.slice(0,DROP_COUNT).reverse(); // lowest-Y first
const DROP_STAGGER=0.08, DROP_DUR=0.42, SQUASH_DUR=0.14, DROP_FROM=16;
const dropItems=dropSorted.map((idx,ai)=>({
  idx, delay:ai*DROP_STAGGER, elapsed:0, phase:'wait',
}));
// Park all drop bricks above
dropItems.forEach(({idx})=>{
  dummy.position.set(meta[idx].basePos.x, meta[idx].basePos.y+DROP_FROM, meta[idx].basePos.z);
  dummy.scale.set(1,1,1); dummy.updateMatrix(); iMesh.setMatrixAt(idx,dummy.matrix);
});
iMesh.instanceMatrix.needsUpdate=true;
let dropDone=false;

/* ─── hover ──────────────────────────────────────── */
const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2(-999,-999);
const labelEl=document.getElementById('label');
let curHover=-1,savedHoverColor=null,colorDirty=false;
addEventListener('mousemove',e=>{ mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1; });
addEventListener('resize',()=>{ cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

/* ─── mode toggle ────────────────────────────────── */
let isDark=true,modeT=0,modeTgt=0;
document.getElementById('toggle').addEventListener('click',()=>{ isDark=!isDark; modeTgt=isDark?0:1; document.getElementById('toggle').textContent=isDark?'🌙':'☀️'; });
function lerpC(out,a,b,t){ out.lerpColors(a,b,t); }

/* ─── matrix helper ──────────────────────────────── */
function setMat(i,pos,sx=1,sy=1,sz=1){ dummy.position.set(pos.x,pos.y,pos.z); dummy.scale.set(sx,sy,sz); dummy.updateMatrix(); iMesh.setMatrixAt(i,dummy.matrix); }

/* ─── render loop ────────────────────────────────── */
const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const dt=clock.getDelta(), t=clock.getElapsedTime();
  ctrl.update();

  /* mode transition */
  modeT=THREE.MathUtils.lerp(modeT,modeTgt,dt*1.2);
  const m=modeT;
  lerpC(skyU.top.value,  SKY.dark.top,  SKY.light.top,  m);
  lerpC(skyU.horiz.value,SKY.dark.horiz,SKY.light.horiz,m);
  lerpC(skyU.bot.value,  SKY.dark.bot,  SKY.light.bot,  m);

  ambient.color.lerpColors(new THREE.Color(0x080c1a),new THREE.Color(0x302818),m);
  ambient.intensity=THREE.MathUtils.lerp(2.8,6.0,m);
  hemi.intensity=THREE.MathUtils.lerp(1.2,3.0,m);
  keyLight.intensity=THREE.MathUtils.lerp(2.6,5.5,m);
  keyLight.color.lerpColors(new THREE.Color(0x9aacc8),new THREE.Color(0xfff5e0),m);
  // Day: sun from upper-right front. Night: moon from upper-left front.
  keyLight.position.lerpVectors(new THREE.Vector3(-16,30,-20),new THREE.Vector3(20,36,12),m);
  fillLight.intensity=THREE.MathUtils.lerp(0.8,1.6,m);
  fillLight.color.lerpColors(new THREE.Color(0xb08858),new THREE.Color(0xfff0d8),m);
  rimLight.intensity=THREE.MathUtils.lerp(0.45,0.15,m);

  const da=Math.max(0,1-m*2.5);
  stars.material.opacity=da*0.85;
  moonMesh.material.opacity=da; moonMesh.material.transparent=true;
  moonDL.intensity=da*1.1;
  const torchI=THREE.MathUtils.lerp(5.5,0.8,m)*(1+Math.sin(t*8.3)*0.15+Math.sin(t*13.7)*0.08);
  torchL.intensity=torchR.intensity=torchI;
  keepGlow.intensity=THREE.MathUtils.lerp(3.5,0.6,m)*(1+Math.sin(t*3.1)*0.08);
  flameL.material.opacity=flameR.material.opacity=THREE.MathUtils.lerp(0.9,0.18,m);

  const la=Math.max(0,m*2.5-0.5);
  clouds.forEach((cl,ci)=>{ cl.visible=la>0.01; cl.material.opacity=la*0.84; cl.position.y=cloudPos[ci][1]+Math.sin(t*0.18+ci)*0.8; cl.position.x=cloudPos[ci][0]+Math.sin(t*0.08+ci*1.4)*2.2; });

  scene.fog.color.lerpColors(new THREE.Color(0x10080c),new THREE.Color(0x88b8d8),m);
  renderer.setClearColor(scene.fog.color);
  gndMat.color.lerpColors(new THREE.Color(0x140e0a),new THREE.Color(0x3c5228),m);
  moatMat.color.lerpColors(new THREE.Color(0x18304c),new THREE.Color(0x2870b8),m);
  moatMat.needsUpdate=true;

  /* flames */
  const fs=0.50+Math.sin(t*11.2)*0.09+Math.sin(t*7.3)*0.05;
  flameL.scale.set(fs,fs*1.35,1); flameR.scale.set(fs,fs*1.35,1);

  /* embers */
  for(let i=0;i<PCOUNT;i++){ pBuf[i*3+1]+=dt*(0.24+Math.sin(t*0.3+i)*0.10); if(pBuf[i*3+1]>11) pBuf[i*3+1]=Math.random(); }
  pGeo.attributes.position.needsUpdate=true;

  /* top-10% drop animation */
  if(!dropDone){
    let allDone=true;
    for(const item of dropItems){
      if(item.phase==='done') continue;
      allDone=false; item.elapsed+=dt;
      const d=meta[item.idx];
      if(item.phase==='wait'){
        if(item.elapsed>=item.delay){ item.phase='fall'; item.elapsed=0; }
      } else if(item.phase==='fall'){
        const p=Math.min(item.elapsed/DROP_DUR,1);
        const ease=p*p*(3-2*p); // smooth-step gravity feel
        setMat(item.idx,{x:d.basePos.x,y:d.basePos.y+DROP_FROM*(1-ease),z:d.basePos.z});
        iMesh.setColorAt(item.idx,d.baseColor.clone().multiplyScalar(Math.min(p*1.8,1)));
        colorDirty=true;
        if(p>=1){ setMat(item.idx,d.basePos); iMesh.setColorAt(item.idx,d.baseColor); item.phase='squash'; item.elapsed=0; }
      } else if(item.phase==='squash'){
        const p=Math.min(item.elapsed/SQUASH_DUR,1);
        const sy=p<0.5?1-0.28*(p*2):0.72+0.28*((p-.5)*2);
        const sx=p<0.5?1+0.18*(p*2):1.18-0.18*((p-.5)*2);
        setMat(item.idx,d.basePos,sx,Math.max(sy,0.28),sx);
        if(p>=1){ setMat(item.idx,d.basePos); item.phase='done'; }
      }
      iMesh.instanceMatrix.needsUpdate=true;
    }
    if(allDone) dropDone=true;
  }

  if(colorDirty){ iMesh.instanceColor.needsUpdate=true; colorDirty=false; }

  /* hover */
  ray.setFromCamera(mouse,cam);
  const hits=ray.intersectObject(iMesh);
  const hi=hits.length>0?hits[0].instanceId:-1;
  if(hi!==curHover){
    if(curHover>=0&&savedHoverColor){ iMesh.setColorAt(curHover,savedHoverColor); iMesh.instanceColor.needsUpdate=true; }
    curHover=hi; savedHoverColor=null;
    if(hi>=0&&meta[hi]){
      const c=new THREE.Color(); iMesh.getColorAt(hi,c); savedHoverColor=c.clone();
      iMesh.setColorAt(hi,c.lerp(new THREE.Color(0xffffff),0.45));
      iMesh.instanceColor.needsUpdate=true;
      labelEl.textContent=meta[hi].label; labelEl.style.opacity='1';
      document.body.style.cursor='pointer';
    } else { labelEl.style.opacity='0'; document.body.style.cursor='default'; }
  }

  renderer.render(scene,cam);
});
</script>
</body>
</html>
